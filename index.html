<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Comparador de Códigos de Barras</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #333;
    }
    input {
      font-size: 22px;
      padding: 12px;
      width: 320px;
      text-align: center;
      margin: 10px;
    }
    #resultado {
      margin-top: 30px;
      font-size: 26px;
      font-weight: bold;
      padding: 15px;
      border-radius: 10px;
      display: inline-block;
    }
    .ok {
      background-color: #4CAF50;
      color: white;
    }
    .error {
      background-color: #e53935;
      color: white;
    }

    #historial {
  margin-top: 40px;
  padding: 15px;
  background: #ffffff;
  border-radius: 10px;
  display: inline-block;
  min-width: 400px;
}

#historial h3 {
  margin-bottom: 10px;
  color: #333;
}

.codigos span {
  display: block;
  font-size: 20px;
  margin: 5px 0;
}

  </style>
</head>
<body>
  <h1>Comparador de Códigos</h1>
  <p>Escanea dos códigos (en cualquier orden).</p>

  <input type="text" id="codigoInput" placeholder="Escanea aquí..." autofocus autocomplete="off">

  <div id="resultado"></div>

  <div id="historial">
  <h3>Últimos códigos escaneados</h3>
  <div class="codigos">
    <span id="ultimo1">—</span>
    <span id="ultimo2">—</span>
  </div>
</div>


  <script>
  let codigo1 = "";
  let codigo2 = "";
  let buffer = "";
  let timeout;

  const input = document.getElementById("codigoInput");
  const result = document.getElementById("resultado");

  function comparar() {
    
    if (codigo1 && codigo2) {
        // Mostrar últimos códigos escaneados
      document.getElementById("ultimo1").textContent = codigo1;
      document.getElementById("ultimo2").textContent = codigo2;


      const c1TieneP = codigo1.startsWith("P");
      const c2TieneP = codigo2.startsWith("P");

      // Debe haber EXACTAMENTE uno con P
      if (c1TieneP === c2TieneP) {
        result.textContent = "❌ Uno debe iniciar con 'P' y el otro no";
        result.className = "error";
        reiniciar();
        return;
      }

      // Quitamos la P al que la tenga
      const limpio1 = c1TieneP ? codigo1.substring(1) : codigo1;
      const limpio2 = c2TieneP ? codigo2.substring(1) : codigo2;

      if (limpio1 === limpio2) {
        result.textContent = "✅ Los códigos coinciden (" + limpio1 + ")";
        result.className = "ok";
      } else {
        result.textContent = "❌ Los códigos NO coinciden (" + limpio1 + " ≠ " + limpio2 + ")";
        result.className = "error";
      }

      reiniciar();
    }
  }

  function reiniciar() {
    setTimeout(() => {
      codigo1 = "";
      codigo2 = "";
      result.textContent = "Escanea el siguiente par de códigos...";
      result.className = "";
    }, 1000);
  }

  function procesarCodigo(value) {
    value = value.trim();

    if (!codigo1) {
      codigo1 = value;
    } else if (!codigo2) {
      codigo2 = value;
    }

    comparar();
  }

  input.addEventListener("input", (e) => {
    clearTimeout(timeout);
    buffer += e.data || "";

    timeout = setTimeout(() => {
      if (buffer.length > 0) {
        procesarCodigo(buffer);
        buffer = "";
        input.value = "";
      }
    }, 150);
  });

  window.addEventListener("click", () => input.focus());
</script>

</body>
</html>
