<!doctype html>
<html lang="es">
    <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Códigos de Barras</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

  </head>
  <body>
    <div class="contenedor">
    <h1>Comparador de Códigos</h1>
    <p>Escanea dos códigos (en cualquier orden).</p>

    <input type="text" id="codigoInput" placeholder="Escanea aquí..." autofocus autocomplete="off">

    <div id="resultado"></div>

    <div id="historial">
      <h3>Últimos códigos escaneados</h3>
      <div class="codigos">
        <span id="ultimo1">—</span>
        <span id="ultimo2">—</span>
      </div>
    </div>

    <br>

    <button id="btnModoTelefono">📱 Modo Teléfono</button>

    <div id="camaraPanel">
      <div id="videoContainer">
        <video id="videoElement" autoplay playsinline muted></video>
        <!-- Mira animada -->
        <div id="mira">
          <div id="scanLine"></div>
        </div>
        <!-- Flash de confirmación -->
        <div id="flashOk"></div>
        <!-- Código detectado en vivo -->
        <div id="codigoDetectado"></div>
      </div>

      <span id="camStatus">Iniciando cámara...</span>

      <div class="camBotones">
        <button id="btnCambiarCamara">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 4v6h6"/>
            <path d="M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
          Cambiar Cámara
        </button>
      </div>
    </div>
  </div>

    <script src="main.js"></script>
  </body>
</html>
